name: Generate Blog Post

on:
  # Run every Monday, Wednesday, Friday at 6:00 AM IST (00:30 UTC)
  schedule:
    - cron: '30 0 * * 1,3,5'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      topic_index:
        description: 'Topic index to generate (leave empty for auto-rotation)'
        required: false
        type: string
      auto_merge:
        description: 'Auto-merge to main (skip review)'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '20'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install -g ts-node typescript @types/node

      - name: Generate blog post
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.topic_index }}" ]; then
            npx ts-node scripts/generate-blog.ts --topic ${{ github.event.inputs.topic_index }}
          else
            npx ts-node scripts/generate-blog.ts --next
          fi
          
          # Get the generated file name
          BLOG_FILE=$(ls -t content/blog/*.md 2>/dev/null | head -1)
          echo "blog_file=${BLOG_FILE}" >> $GITHUB_OUTPUT
          
          if [ -n "$BLOG_FILE" ]; then
            # Extract title from frontmatter
            TITLE=$(grep '^title:' "$BLOG_FILE" | sed 's/title: *"//' | sed 's/"$//' | head -1)
            echo "blog_title=${TITLE}" >> $GITHUB_OUTPUT
            echo "generated=true" >> $GITHUB_OUTPUT
          else
            echo "generated=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.generate.outputs.generated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "📝 Add blog: ${{ steps.generate.outputs.blog_title }}"
          title: "📝 New Blog Post: ${{ steps.generate.outputs.blog_title }}"
          body: |
            ## 🤖 AI-Generated Blog Post
            
            This blog post was automatically generated using GPT-4.
            
            **File:** `${{ steps.generate.outputs.blog_file }}`
            
            ### ✅ Review Checklist
            
            Before merging, please verify:
            
            - [ ] Title is accurate and SEO-friendly
            - [ ] Content is technically correct
            - [ ] Commands/code examples are valid and tested
            - [ ] No sensitive information exposed
            - [ ] Internal links are properly set
            - [ ] Grammar and formatting look good
            - [ ] Meta description is compelling
            - [ ] Keywords are appropriate
            
            ### 📋 Post-Merge Tasks
            
            - [ ] Update `draft: true` to `draft: false` in frontmatter
            - [ ] Add any relevant screenshots
            - [ ] Test on staging environment
            - [ ] Share on social media
            
            ---
            *This PR was auto-generated by the DevOps Duoo blog pipeline.*
          branch: blog/auto-generated-${{ github.run_number }}
          delete-branch: true
          labels: |
            blog
            ai-generated
            needs-review

      - name: Auto-merge (if enabled)
        if: |
          steps.generate.outputs.generated == 'true' && 
          github.event.inputs.auto_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge blog/auto-generated-${{ github.run_number }} --auto --squash

  notify:
    runs-on: ubuntu-latest
    needs: generate
    if: always()
    
    steps:
      - name: Notify on failure
        if: needs.generate.result == 'failure'
        run: |
          echo "::warning::Blog generation failed. Check the logs for details."
          # Add Slack/Discord webhook notification here if needed
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"⚠️ Blog generation failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
