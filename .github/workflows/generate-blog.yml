name: Generate Blog Post

on:
  # Run every Monday, Wednesday, Friday at 6:00 AM IST (00:30 UTC)
  schedule:
    - cron: '30 0 * * 1,3,5'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      topic_index:
        description: 'Topic index to generate (leave empty for auto-rotation)'
        required: false
        type: string

env:
  NODE_VERSION: '20'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        id: generate
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.topic_index }}" ]; then
            npx tsx scripts/generate-blog.ts --topic ${{ github.event.inputs.topic_index }}
          else
            npx tsx scripts/generate-blog.ts --next
          fi
          
          # Get the generated file name
          BLOG_FILE=$(ls -t content/blog/*.md 2>/dev/null | head -1)
          echo "blog_file=${BLOG_FILE}" >> $GITHUB_OUTPUT
          
          if [ -n "$BLOG_FILE" ]; then
            # Extract title from frontmatter
            TITLE=$(grep '^title:' "$BLOG_FILE" | sed 's/title: *"//' | sed 's/"$//' | head -1)
            echo "blog_title=${TITLE}" >> $GITHUB_OUTPUT
            echo "generated=true" >> $GITHUB_OUTPUT
          else
            echo "generated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push blog post
        if: steps.generate.outputs.generated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/blog/
          git commit -m "📝 Add blog: ${{ steps.generate.outputs.blog_title }}"
          git push

      - name: Trigger Netlify deploy
        if: steps.generate.outputs.generated == 'true'
        run: curl -X POST -d {} ${{ secrets.NETLIFY_BUILD_HOOK }}

  notify:
    runs-on: ubuntu-latest
    needs: generate
    if: always()
    
    steps:
      - name: Notify on failure
        if: needs.generate.result == 'failure'
        run: |
          echo "::warning::Blog generation failed. Check the logs for details."
          # Add Slack/Discord webhook notification here if needed
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"⚠️ Blog generation failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
